# UBP 로봇 전용 설정.
# - 시뮬레이션 (pybullet) 또는 실 로봇 (dynamixel) publisher 선택.
# - shoulder_pitch ±3.14 잠정 (사용자 추후 조정).
# - 안전 자세 모든 관절 0.0 (사용자 결정).
# - 책상 시나리오 대비 min_visibility 0.1.

tracker:
  type: realsense
  realsense:
    color_resolution: [640, 480]
    depth_resolution: [640, 480]
    fps: 30
    align_to: color
    enable_imu: false
    depth_max_m: 4.0
    # 모델 선택: lite (5MB, 빠름) / full (9MB, 균형) / heavy (29MB, 정확)
    # heavy 모델로 keypoint 위치 정확도 큰 폭 향상. 단 첫 로드 5초 추가.
    model_asset_path: ./models/pose_landmarker_heavy.task
    # ★ 핵심: MediaPipe의 pose_world_landmarks (3D meters, hip-centered) 사용.
    #    false = RealSense depth + 픽셀 deproject (얇은 부위 노이즈 큼).
    #    true = MediaPipe 3D pose model 사용 (Yi 2012의 NiTE와 유사한 접근).
    use_world_landmarks: true
    # Gravity-aligned aligner: 운영자의 토르소 tilt 와 무관하게 world up 으로 v 고정.
    # 운영자가 자연스레 앞으로 살짝 기울어진 자세에서도 sh_r 과대 추정 방지.
    # null → body-relative (head - mid_hip, 기존 동작)
    # MediaPipe pose_world_landmarks 의 +y 가 image-down 이면 [0,-1,0], up 이면 [0,1,0].
    # 처음 실행 후 debug_retarget 의 [AXIS] 로그 보고 결정. 일단 추정값.
    gravity_up: [0.0, -1.0, 0.0]
    # Hand tracking backend. "mediapipe" (CPU, 7.5 MB, ~50% 검출률) 또는
    # "hamer" (GPU 필수, ~1.5 GB, ~100% 검출률, MANO 라이센스 등록 필요).
    # null/off → 손 추적 비활성 (w_yaw/w_pitch 는 0 passthrough).
    hand_backend: mediapipe
    # mediapipe backend params
    hand_model_asset_path: ./models/hand_landmarker.task
    hand_min_confidence: 0.5
    # hamer backend params — scripts/install_hamer.ps1 로 설치 후 활성화.
    hamer_device: cuda             # "cuda" or "cpu" (CPU 는 ~500 ms/hand, 사실상 unusable)
    hamer_checkpoint_path: null    # null → HaMeR default (~/.cache/hamer)
    mano_dir: null                 # null → HaMeR default (<hamer_repo>/_DATA/data/mano)
  pose:
    model: mediapipe_pose_lite
    min_visibility: 0.1
  mock:
    jsonl_path: null
    loop: true

retarget:
  robot:
    # URDF 길이와 동기화 — 사용자 실측치로 교체
    upper_arm_length: 0.25
    lower_arm_length: 0.25
    shoulder_offset: [0.0, 0.18, 0.10]
  operator_calibration: t_pose_hold
  fixed_arm_length: 0.55
  calibration_frames: 30
  # theta_1 = atan2(z,x) - theta_5 (Yi 2012 식 3) 에서 -theta_5 제거.
  # MediaPipe elbow 노이즈가 sh_p 로 propagate 되는 것을 차단해 sh_p 안정성 ↑.
  # 단점: 완전 굽힌 팔에서 손 위치가 약간 어긋날 수 있음 (보통 무시 가능).
  decouple_pitch_elbow: true
  # ===== Per-joint REST-POSE OFFSET =====
  # 캘리브레이션 단계에서 자동 캡쳐 (default). 운영자가 calibration_frames 동안
  # 양팔 자연스럽게 hang → 그 자세의 retargeter 출력 평균을 rest_offsets 로 사용
  # → robot zero = 운영자 rest. 해부학적 비대칭 (오른어깨 forward 등) 자동 보정.
  #
  # 아래 dict 에 값을 명시하면 해당 joint 만 manual override (auto 값 무시).
  # 모든 joint auto 사용 시 null 또는 비워둠.
  rest_offsets: null
  # Per-joint motion scaling — robot이 운영자 동작의 N배로 따라감.
  # 1.0 = 그대로, 1.2 = 120% (amplify, 작은 motion도 robot이 더 크게 따라함),
  # 0.5 = 절반. 양팔 비대칭 (왼팔 좋고 오른팔 못따라가는 경우) 보정에 사용:
  #   r_shoulder_*: 1.2~1.5 로 올려서 오른팔 더 크게 반응시킴.
  output_gain:
    r_shoulder_pitch: 1.0
    l_shoulder_pitch: 1.0
    r_shoulder_roll: 1.0
    l_shoulder_roll: 1.0
    r_shoulder_yaw: 1.0
    l_shoulder_yaw: 1.0
    r_elbow: 1.0
    l_elbow: 1.0
    r_wrist_yaw: 1.0
    l_wrist_yaw: 1.0
    r_wrist_pitch: 1.0
    l_wrist_pitch: 1.0
    torso_yaw: 1.0
    neck_yaw: 1.0
    head_pitch: 1.0

filter:
  # ===== 튜닝 가이드 =====
  # world_landmarks 사용 후 노이즈가 줄어 smoothing 약화 가능.
  # 빠른 motion 반응 → min_cutoff 올림 / beta 올림
  # 차분히 → min_cutoff 내림
  # =======================
  # 3D keypoint smoother — world_landmarks 사용 시 매우 약하게 가능
  keypoint_smoother:
    min_cutoff: 1.5    # 0.3 → 1.5 (빠른 반응)
    beta: 0.03         # 0.005 → 0.03
    d_cutoff: 1.0
  # 관절 각도 smoother
  one_euro:
    min_cutoff: 3.0    # 1.0 → 3.0 (responsive)
    beta: 0.07         # 0.02 → 0.07
    d_cutoff: 1.0
  joint_limits_factor: 0.9
  max_velocity_rad_s: 8.0   # 4.0 → 8.0 (빠른 motion 허용)
  velocity_violation_factor: 50.0
  mechanical_limits:
    # UBP: 14 DOF (no torso_yaw, torso is fixed)
    r_shoulder_pitch: [-3.14, 3.14]
    r_shoulder_roll:  [-3.14, 3.14]
    r_shoulder_yaw:   [-3.14, 3.14]
    r_elbow:          [0.0, 2.79]
    r_wrist_yaw:      [-3.14, 3.14]
    r_wrist_pitch:    [-1.57, 1.57]
    l_shoulder_pitch: [-3.14, 3.14]
    l_shoulder_roll:  [-3.14, 3.14]
    l_shoulder_yaw:   [-3.14, 3.14]
    l_elbow:          [0.0, 2.79]
    l_wrist_yaw:      [-3.14, 3.14]
    l_wrist_pitch:    [-1.57, 1.57]
    neck_yaw:         [-1.57, 1.57]
    head_pitch:       [-1.0, 1.0]

publisher:
  type: pybullet      # 또는 mujoco / dynamixel / mock
  rate_hz: 100
  log_path: null
  pybullet:
    urdf_path: ./models/ubp.urdf
    gui: true               # GUI 창 띄움 (테스트는 false로)
    fixed_base: true        # 토르소 고정 (지지 베이스 가정)
    init_pose: [0.0, 0.0, 0.0]   # base_link 위치 (x, y, z)
  mujoco:
    model_path: ./models/ubp.xml  # MJCF native format
    gui: true               # mujoco.viewer.launch_passive
  dynamixel:
    port: COM5              # PYO님 환경에 맞게 변경
    baud: 1000000
    # Servo ID + 모델 — 사용자 확정 후 ID 채우기 (14 DOF, no torso_yaw)
    servos:
      r_shoulder_pitch: {id: 1,  model: MX-64}
      l_shoulder_pitch: {id: 2,  model: MX-64}
      r_shoulder_roll:  {id: 3,  model: MX-64}
      l_shoulder_roll:  {id: 4,  model: MX-64}
      r_shoulder_yaw:   {id: 5,  model: MX-28}   # upper arm twist
      l_shoulder_yaw:   {id: 6,  model: MX-28}
      r_elbow:          {id: 7,  model: MX-28}
      l_elbow:          {id: 8,  model: MX-28}
      r_wrist_yaw:      {id: 9,  model: MX-28}   # forearm twist
      l_wrist_yaw:      {id: 10, model: MX-28}
      r_wrist_pitch:    {id: 11, model: XL430}
      l_wrist_pitch:    {id: 12, model: XL430}
      # neck_yaw + head_pitch 는 2XL430 1개 액추에이터 (축 2개, ID 2개)
      neck_yaw:         {id: 13, model: 2XL430}
      head_pitch:       {id: 14, model: 2XL430}

safety:
  deadman:
    type: keyboard
    key: space
  estop_key: esc
  confidence_threshold: 0.5
  loss_grace_period_s: 0.5
  ramp_to_safe_s: 1.5
  watchdog_factor: 3
  # UBP: 모든 관절 0 rad (사용자 결정, 14 DOF)
  safe_pose:
    r_shoulder_pitch: 0.0
    r_shoulder_roll: 0.0
    r_shoulder_yaw: 0.0
    r_elbow: 0.0
    r_wrist_yaw: 0.0
    r_wrist_pitch: 0.0
    l_shoulder_pitch: 0.0
    l_shoulder_roll: 0.0
    l_shoulder_yaw: 0.0
    l_elbow: 0.0
    l_wrist_yaw: 0.0
    l_wrist_pitch: 0.0
    neck_yaw: 0.0
    head_pitch: 0.0

main:
  loop_rate_hz: 60
  latency_log_every: 30
  latency_p95_budget_s: 0.1
